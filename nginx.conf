server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: todas las rutas caen a index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # cache de assets con hash
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
